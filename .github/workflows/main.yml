name: Create Glow for Facebook app

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "Facebook"
        required: true
        type: string

      bundle_id:
        description: "BundleID (Optional)"
        default: "com.facebook.Facebook"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: main
          submodules: recursive

      - name: Hide sensitive inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: display_name,bundle_id

      - name: Download and validate IPA
        run: |
          wget "${{ inputs.ipa_url }}" --no-verbose -O facebook.ipa

          file_type=$(file --mime-type -b facebook.ipa)

          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Invalid IPA file type detected: $file_type"
            exit 1
          fi

      - name: Extract Facebook version from IPA
        run: |
          unzip -q facebook.ipa -d fb_tmp
          PLIST_PATH=$(find fb_tmp/Payload/*.app -name "Info.plist" -maxdepth 1 | head -1)

          FB_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST_PATH")

          echo "FB_VERSION=$FB_VERSION" >> $GITHUB_ENV
          echo "Detected Facebook version: $FB_VERSION"

          rm -rf fb_tmp

      - name: Install dependencies
        run: |
          brew install make ldid

      - name: Set GNU make in PATH
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Install cyan (pyzule)
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Download Glow tweak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          api_url="https://api.github.com/repos/dayanch96/Glow/releases/latest"

          # Warm up API (avoids occasional rate/permission quirks)
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" "$api_url" > /dev/null

          response=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" "$api_url")

          tag_name=$(echo "$response" | jq -r '.tag_name')
          deb_url=$(echo "$response" | jq -r '.assets[0].browser_download_url')

          if [[ "$deb_url" == "null" || -z "$deb_url" ]]; then
            echo "::error::Failed to fetch Glow asset URL"
            exit 1
          fi

          echo "GLOW_TAG=$tag_name" >> $GITHUB_ENV

          echo "Downloading Glow: $deb_url"
          wget "$deb_url" --no-verbose -O glow_fb.deb

      - name: Generate output filename
        run: |
          OUTPUT_NAME="Facebook_v${{ env.FB_VERSION }}_Glow_${{ env.GLOW_TAG }}"
          echo "OUTPUT_NAME=$OUTPUT_NAME" >> $GITHUB_ENV
          echo "Output: $OUTPUT_NAME"

      - name: Inject tweaks into IPA
        run: |
          cyan -i facebook.ipa \
               -o "${{ env.OUTPUT_NAME }}.ipa" \
               -uwef glow_fb.deb \
               -n "${{ inputs.display_name }}" \
               -b "${{ inputs.bundle_id }}" \
               -s

      - name: Strip embedded Swift dylibs
        run: |
          unzip -q "${{ env.OUTPUT_NAME }}.ipa" -d tmp_payload

          # Remove unnecessary Swift runtime libraries
          find tmp_payload/Payload/*.app/ -name "libswift*.dylib" -print -delete

          cd tmp_payload
          zip -qr "../${{ env.OUTPUT_NAME }}.ipa" Payload
          cd ..

          rm -rf tmp_payload

      - name: Create or update GitHub Release (idempotent)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.OUTPUT_NAME }}"
          FILE="${{ env.OUTPUT_NAME }}.ipa"

          echo "Processing release: $TAG"

          # Check if release already exists
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release exists. Uploading asset (overwrite if needed)..."

            gh release upload "$TAG" "$FILE" --clobber
          else
            echo "Release does not exist. Creating new release..."

            gh release create "$TAG" "$FILE" \
              --title "$TAG" \
              --notes "Auto-generated release"
          fi

      - name: Output Release URL
        run: |
          echo "::notice::Release available at: https://github.com/${{ github.repository }}/releases"
